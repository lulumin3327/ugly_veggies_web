<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>以貌取菜 — 購買 / 聯絡</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
  <style>
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 4rem;
      align-items: start;
    }
    .contact-info {
      position: sticky;
      top: calc(var(--nav-height) + 2rem);
    }
    .info-block {
      margin-bottom: 2rem;
    }
    .info-block__label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }
    .info-block__value {
      font-size: 0.95rem;
      color: var(--text-dark);
      line-height: 1.65;
    }
    .info-block__value a {
      color: var(--primary-color);
      text-decoration: underline;
      text-decoration-color: var(--border-color);
      text-underline-offset: 3px;
    }
    .info-block__value a:hover {
      text-decoration-color: var(--primary-color);
    }

    /* Form */
    .contact-form {
      background-color: var(--white);
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }
    .form-label span {
      color: var(--accent-color);
      margin-left: 2px;
    }
    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--text-dark);
      background-color: var(--bg-color);
      transition: border-color 0.2s;
    }
    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--secondary-color);
    }
    .form-textarea {
      min-height: 120px;
      resize: vertical;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .form-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
    }
    .form-submit {
      width: 100%;
      padding: 0.85rem;
      font-size: 1rem;
    }
    .success-msg {
      display: none;
      background-color: rgba(123, 174, 62, 0.12);
      border: 1.5px solid var(--secondary-color);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      text-align: center;
      color: var(--primary-color);
      font-weight: 500;
      margin-top: 1rem;
    }

    @media (max-width: 860px) {
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }
      .contact-info { position: static; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main class="page-content">

    <section class="page-hero">
      <div class="container">
        <span class="eyebrow" style="color:rgba(255,255,255,0.6)">聯絡我們</span>
        <h1>購買 / 合作洽詢</h1>
        <p>想訂購雜誌、桌曆，或有合作提案，都歡迎透過以下表單聯繫我們。</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="contact-grid">

          <!-- Info -->
          <aside class="contact-info">
            <div class="info-block">
              <div class="info-block__label">電子信箱</div>
              <div class="info-block__value">
                <a href="mailto:hello@uglyveggie.tw">hello@uglyveggie.tw</a>
              </div>
            </div>
            <div class="info-block">
              <div class="info-block__label">Instagram</div>
              <div class="info-block__value">
                <a href="#">@uglyveggiemag</a>
              </div>
            </div>
            <div class="info-block">
              <div class="info-block__label">回覆時間</div>
              <div class="info-block__value">週一至週五<br>上午 10:00 — 下午 18:00</div>
            </div>
            <div class="info-block">
              <div class="info-block__label">出貨說明</div>
              <div class="info-block__value">確認訂單後 3–5 個工作天寄出<br>僅提供台灣本島配送</div>
            </div>
            <div style="padding:1.5rem;background:var(--bg-section);border-radius:var(--radius-md);border:1.5px solid var(--border-color);">
              <div style="font-size:.8rem;color:var(--text-muted);margin-bottom:.4rem;">📦 目前庫存狀態</div>
              <div style="font-size:.875rem;color:var(--primary-color);font-weight:500;">雜誌 Vol.01–06：供貨中</div>
              <div style="font-size:.875rem;color:var(--primary-color);font-weight:500;">桌曆 2027：預購中</div>
              <div style="font-size:.875rem;color:var(--accent-color);font-weight:500;">限量簽名版：剩餘 67 本</div>
            </div>
          </aside>

          <!-- Form -->
          <div>
            <form class="contact-form" id="contact-form" novalidate>
              <h2 style="font-size:1.4rem;margin-bottom:1.75rem;">填寫訂購 / 詢問表單</h2>

              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="name">姓名<span>*</span></label>
                  <input type="text" id="name" class="form-input" placeholder="你的名字" required />
                </div>
                <div class="form-group">
                  <label class="form-label" for="email">Email<span>*</span></label>
                  <input type="email" id="email" class="form-input" placeholder="email@example.com" required />
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="inquiry-type">詢問類型<span>*</span></label>
                <select id="inquiry-type" class="form-select" required>
                  <option value="" disabled selected>請選擇…</option>
                  <option value="magazine">購買雜誌</option>
                  <option value="calendar">購買桌曆</option>
                  <option value="bundle">合購套組</option>
                  <option value="collab">合作提案</option>
                  <option value="media">媒體採訪</option>
                  <option value="other">其他詢問</option>
                </select>
              </div>

              <div class="form-group" id="product-group" style="display:none;">
                <label class="form-label" for="product">選擇商品</label>
                <select id="product" class="form-select">
                  <option value="">請選擇商品…</option>
                  <optgroup label="雜誌">
                    <option>Vol.01 皺眉檸檬創刊號 — NT$280</option>
                    <option>Vol.02 方形番茄的一生 — NT$280</option>
                    <option>Vol.03 雙頭紅蘿蔔特輯 — NT$280</option>
                    <option>Vol.04 倒三角花椰特輯 — NT$280</option>
                    <option>Vol.05 長腿馬鈴薯物語 — NT$280</option>
                    <option>Vol.06 心形草莓告白 — NT$280</option>
                    <option>全刊號合購 Vol.01–06 — NT$1,380</option>
                  </optgroup>
                  <optgroup label="桌曆">
                    <option>醜蔬果桌曆 2026 標準版 — NT$480</option>
                    <option>醜蔬果桌曆 2026 限量簽名版 — NT$880</option>
                    <option>醜蔬果桌曆 2025 特價版 — NT$320</option>
                  </optgroup>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label" for="message">留言</label>
                <textarea id="message" class="form-textarea" placeholder="數量、配送地址，或其他想說的…"></textarea>
                <p class="form-hint">若有特殊需求（如大量訂購、禮品包裝）請在此說明。</p>
              </div>

              <button type="submit" class="btn btn--primary form-submit">送出表單</button>

              <div class="success-msg" id="success-msg">
                🥕 謝謝你！我們收到了你的訊息，會在 2 個工作天內回覆。
              </div>
            </form>
          </div>

        </div>
      </div>
    </section>

  </main>

  <div id="footer-placeholder"></div>

  <script src="component.js"></script>
  <script src="main.js"></script>
  <script>
    // Show product selector based on inquiry type
    const typeSelect = document.getElementById('inquiry-type');
    const productGroup = document.getElementById('product-group');

    typeSelect.addEventListener('change', () => {
      const show = ['magazine', 'calendar', 'bundle'].includes(typeSelect.value);
      productGroup.style.display = show ? 'block' : 'none';
    });

    // Form submit demo
    document.getElementById('contact-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      if (!name || !email) {
        alert('請填寫姓名與 Email');
        return;
      }
      document.getElementById('success-msg').style.display = 'block';
      e.target.querySelector('button[type=submit]').disabled = true;
    });
  </script>
</body>
</html>
